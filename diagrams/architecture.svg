<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" role="img">
<title>AWS WireGuard Private SSH Lab Architecture</title>
<desc>Architecture diagram showing local machine connecting through WireGuard VPN tunnel to AWS VPN server in public subnet, then to private EC2 in private subnet</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background -->
<rect width="680" height="580" fill="#ffffff"/>

<!-- AWS Cloud container -->
<rect x="300" y="60" width="350" height="480" rx="20" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="475" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0C447C">AWS Cloud (ap-south-1)</text>
<text x="475" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#185FA5">VPC: 10.0.0.0/16</text>

<!-- Public Subnet -->
<rect x="325" y="125" width="300" height="160" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="475" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#085041">Public subnet</text>
<text x="475" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#0F6E56">10.0.1.0/24</text>

<!-- VPN Server box -->
<rect x="355" y="185" width="240" height="76" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
<text x="475" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#04342C">WireGuard VPN server</text>
<text x="475" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#085041">Public IP: 13.201.35.81</text>
<text x="475" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#085041">Private IP: 10.0.1.5</text>

<!-- Private Subnet -->
<rect x="325" y="330" width="300" height="160" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="475" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#26215C">Private subnet</text>
<text x="475" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#534AB7">10.0.2.0/24</text>

<!-- Private EC2 box -->
<rect x="355" y="390" width="240" height="76" rx="8" fill="#AFA9EC" stroke="#534AB7" stroke-width="1"/>
<text x="475" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#26215C">Private EC2 server</text>
<text x="475" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3C3489">No public IP</text>
<text x="475" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3C3489">Private IP: 10.0.2.37</text>

<!-- Local Machine -->
<rect x="30" y="270" width="200" height="76" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="130" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4A1B0C">Local machine</text>
<text x="130" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#993C1D">WireGuard client</text>
<text x="130" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#993C1D">VPN IP: 10.222.134.2</text>

<!-- IGW badge -->
<rect x="240" y="210" width="50" height="28" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
<text x="265" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#633806">IGW</text>

<!-- Arrow: Local to IGW (VPN Tunnel) -->
<line x1="230" y1="300" x2="270" y2="232" stroke="#D85A30" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrow)"/>

<!-- Arrow: IGW to VPN Server -->
<line x1="295" y1="224" x2="353" y2="224" stroke="#D85A30" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrow)"/>

<!-- Arrow: VPN Server to Private EC2 -->
<line x1="475" y1="261" x2="475" y2="388" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- VPN tunnel label -->
<rect x="90" y="236" width="156" height="22" rx="4" fill="#ffffff" opacity="0.85"/>
<text x="168" y="251" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#993C1D">WireGuard tunnel (encrypted)</text>

<!-- Private network label -->
<text x="510" y="330" font-family="Arial, sans-serif" font-size="12" fill="#534AB7">Private</text>
<text x="510" y="346" font-family="Arial, sans-serif" font-size="12" fill="#534AB7">network</text>

<!-- No direct access -->
<line x1="230" y1="308" x2="348" y2="410" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
<text x="235" y="388" font-family="Arial, sans-serif" font-size="12" fill="#A32D2D">No direct</text>
<text x="235" y="404" font-family="Arial, sans-serif" font-size="12" fill="#A32D2D">access ✗</text>

<!-- Port info -->
<text x="30" y="510" font-family="Arial, sans-serif" font-size="12" fill="#444441">UDP 51820 — WireGuard</text>
<text x="30" y="526" font-family="Arial, sans-serif" font-size="12" fill="#444441">TCP 22 — SSH (VPN only)</text>

<!-- SSH note -->
<text x="355" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3B6D11">SSH works only</text>
<text x="355" y="526" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3B6D11">through VPN ✓</text>

</svg>
